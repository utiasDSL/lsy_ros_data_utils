          expected_hz: 100.0
          warn_below_hz: 80.0
        callback_group_id: 0
      - name: "/livox/imu"
        type: "sensor_msgs/msg/Imu"
        qos: "default"
        mode: "typed"
        monitor:
          expected_hz: 200.0
          warn_below_hz: 180.0
        callback_group_id: 0

      # rslidar
      - name: "/rslidar/imu_data"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 200.0
          warn_below_hz: 180.0
        callback_group_id: 0

