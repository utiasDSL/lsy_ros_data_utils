---
monitor:
  enabled: true
  print_hz: .5
  ewma_tau_sec: 2.0
  warn_grace_sec: 2.0
  use_ansi_color: true

num_callback_groups: 1

bags:
  - name: "saberguide_imus"
    bag_uri: "/home/user/00_bags"
    storage_id: "mcap"
    uri_with_datetime: true
    max_queue_bytes: 1073741824     # 1GiB MiB
    max_queue_size: 2000          # secondary cap
    bag_cache_size: 1             # GB
    overflow_policy: block  # or "block" drop_oldest
    warn_on_overflow: true
    overflow_warn_period_sec: 1.0
    compress_image: false
    jpeg_quality: 95
    png_level: 3
    compression_type: "png"
    topics:
      - name: "/mavros/imu/data_raw"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 50.0
          warn_below_hz: 30.
        callback_group_id: 0
      - name: "/mavros/imu/data"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 1.0
          warn_below_hz: .5
        callback_group_id: 0
      - name: "/mavros/imu/mag"
        type: "sensor_msgs/msg/MagneticField"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.
        callback_group_id: 0
      - name: "/mavros/imu/temperature_imu"
        type: "sensor_msgs/msg/Temperature"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 10.0
          warn_below_hz: 8.
        callback_group_id: 0

      # realsense
      - name: "/rs456/camera/imu"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 200.0
          warn_below_hz: 180.0
        callback_group_id: 0

      # zed
      - name: "/zed/zed_node/imu/data"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 100.0
          warn_below_hz: 80.0
        callback_group_id: 0
      - name: "/zed/zed_node/imu/data_raw"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 100.0
          warn_below_hz: 80.0
        callback_group_id: 0
      - name: "/zed/zed_node/temperature/imu"
        type: "sensor_msgs/msg/Temperature"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 1.0
          warn_below_hz: .5
        callback_group_id: 0
      - name: "/zed/zed_node/status/heartbeat"
        type: "zed_msgs/msg/Heartbeat"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 1.0
          warn_below_hz: 0.5
        callback_group_id: 0
      - name: "/zed/zed_node/status/health"
        type: "zed_msgs/msg/HealthStatusStamped"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 0
      - name: "/zed/zed_node/left_cam_imu_transform"
        type: "geometry_msgs/msg/TransformStamped"
        qos: "sensor"
        mode: "typed"
