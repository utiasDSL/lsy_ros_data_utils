---
monitor:
  enabled: true
  print_hz: .5
  ewma_tau_sec: 2.0
  warn_grace_sec: 2.0
  use_ansi_color: true

num_callback_groups: 3

bags:
  - name: "saberguide_zed"
    bag_uri: "/home/user/00_bags"
    storage_id: "mcap"
    storage_config_file: "mcap_config.yaml"
    uri_with_datetime: true
    max_queue_bytes: 4294967296     # 1GiB MiB
    max_queue_size: 5000          # secondary cap
    bag_cache_size: 4             # GB
    overflow_policy: block  # or "block" drop_oldest
    warn_on_overflow: true
    overflow_warn_period_sec: 1.0
    compress_image: false
    jpeg_quality: 95
    png_level: 3
    compression_type: "png"
    topics:
      # zed
      - name: "/zed/zed_node/imu/data"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 100.0
          warn_below_hz: 80.0
        callback_group_id: 0
      - name: "/zed/zed_node/imu/data_raw"
        type: "sensor_msgs/msg/Imu"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 100.0
          warn_below_hz: 80.0
        callback_group_id: 0
      - name: "/zed/zed_node/depth/camera_info"
        type: "sensor_msgs/msg/CameraInfo"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 1
      - name: "/zed/zed_node/depth/depth_registered"
        type: "sensor_msgs/msg/Image"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 1
      - name: "/zed/zed_node/left/color/rect/image/camera_info"
        type: "sensor_msgs/msg/CameraInfo"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 2
      - name: "/zed/zed_node/left/color/rect/image"
        type: "sensor_msgs/msg/Image"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 2
      - name: "/zed/zed_node/right/color/rect/camera_info"
        type: "sensor_msgs/msg/CameraInfo"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 2
      - name: "/zed/zed_node/right/color/rect/image"
        type: "sensor_msgs/msg/Image"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 2
      
      - name: "/zed/zed_node/odom"
        type: "nav_msgs/msg/Odometry"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 0
      - name: "/zed/zed_node/pose"
        type: "geometry_msgs/msg/PoseStamped"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 0
      - name: "/zed/zed_node/temperature/imu"
        type: "sensor_msgs/msg/Temperature"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 1.0
          warn_below_hz: .5
        callback_group_id: 0
      - name: "/zed/zed_node/status/heartbeat"
        type: "zed_msgs/msg/Heartbeat"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 1.0
          warn_below_hz: 0.5
        callback_group_id: 0
      - name: "/zed/zed_node/status/health"
        type: "zed_msgs/msg/HealthStatusStamped"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 0
      - name: "/zed/zed_node/pose/status"
        type: "zed_msgs/msg/PosTrackStatus"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.0
        callback_group_id: 0
      - name: "/zed/zed_node/left_cam_imu_transform"
        type: "geometry_msgs/msg/TransformStamped"
        qos: "sensor"
        mode: "typed"
        monitor:
          expected_hz: 100.0
          warn_below_hz: 80.0
        callback_group_id: 0


      