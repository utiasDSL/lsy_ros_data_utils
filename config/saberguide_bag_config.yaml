---
monitor:
  enabled: true
  print_hz: .5
  ewma_tau_sec: 2.0
  warn_grace_sec: 2.0
  use_ansi_color: true

num_callback_groups: 3

bags:
  - name: "saberguide"
    bag_uri: "/home/user/00_bags"
    storage_id: "mcap"
    storage_config_file: "mcap_config.yaml"
    uri_with_datetime: true
    max_queue_bytes: 2073741824     # 1GiB MiB
    max_queue_size: 5000          # secondary cap
    bag_cache_size: 2             # GB
    overflow_policy: block  # or "block" drop_oldest
    warn_on_overflow: true
    overflow_warn_period_sec: 1.0
    compress_image: false
    jpeg_quality: 95
    png_level: 3
    compression_type: "png"
    topics:
      # mavros
      - name: "/mavros/altitude"
        type: "mavros_msgs/msg/Altitude"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 10.0
          warn_below_hz: 8.0
        callback_group_id: 0
      - name: "/mavros/estimator_status"
        type: "mavros_msgs/msg/EstimatorStatus"
        qos: "default"
        mode: "generic"
        monitor:
          expected_hz: 1.0
          warn_below_hz: .5
        callback_group_id: 0
      - name: "/mavros/gps_input/gps_input"
        type: "mavros_msgs/msg/GPSINPUT"
