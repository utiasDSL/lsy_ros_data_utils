        mode: "generic"
        monitor:
          expected_hz: 1.0
          warn_below_hz: .5
        callback_group_id: 0
      - name: "/mavros/imu/mag"
        type: "sensor_msgs/msg/MagneticField"
        qos: "sensor"
        mode: "generic"
        monitor:
          expected_hz: 15.0
          warn_below_hz: 10.
        callback_group_id: 0
      - name: "/mavros/local_position/odom"
        type: "nav_msgs/msg/Odometry"
        qos: "sensor"
        mode: "generic"
        monitor:
